name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-4-dev libwayland-dev wayland-protocols \
          gobject-introspection libgirepository1.0-dev meson ninja-build
    - name: Build and install gtk4-layer-shell
      run: |
        git clone --depth 1 --branch v1.1.0 https://github.com/wmww/gtk4-layer-shell.git
        cd gtk4-layer-shell
        meson setup --prefix /usr -Dexamples=false -Ddocs=false -Dtests=false build
        ninja -C build
        sudo ninja -C build install
        sudo ldconfig
    - name: check
      run: cargo check --verbose
    - name: Run tests
      run: cargo test --verbose
